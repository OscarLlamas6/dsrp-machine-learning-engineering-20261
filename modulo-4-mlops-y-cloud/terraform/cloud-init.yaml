#cloud-config
# Cloud-init script: installs Docker, optionally logs into GHCR, and runs the
# Telco trainer container once on first boot via systemd `oneshot`. If a
# `schedule` (systemd OnCalendar expression) is provided, also installs a
# `dsrp-trainer.timer` so the trainer re-runs on that cadence.

package_update: true
package_upgrade: false

write_files:
  - path: /etc/dsrp/trainer.env
    permissions: "0600"
    owner: root:root
    content: |
      AZURE_STORAGE_CONNECTION_STRING=${conn_str}
      AZURE_STORAGE_CONTAINER=${container}

  - path: /usr/local/bin/run-trainer.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      IMAGE="${image_ref}"
      GHCR_USER="${ghcr_user}"
      GHCR_TOKEN="${ghcr_token}"

      if [[ -n "$GHCR_TOKEN" && -n "$GHCR_USER" ]]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      fi

      echo "[run-trainer] pulling $IMAGE"
      docker pull "$IMAGE"

      echo "[run-trainer] running trainer"
      docker run --rm \
        --env-file /etc/dsrp/trainer.env \
        --name dsrp-trainer \
        "$IMAGE"

  - path: /etc/systemd/system/dsrp-trainer.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=DSRP módulo 4 — one-shot trainer
      After=docker.service network-online.target
      Wants=docker.service network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/run-trainer.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  # Always install the timer unit; whether it gets *enabled* is decided by the
  # runcmd block below based on the `schedule` template var. Persistent=true
  # makes systemd run a missed firing once the VM comes back up.
  - path: /etc/systemd/system/dsrp-trainer.timer
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=DSRP módulo 4 — scheduled trainer (cron-like)

      [Timer]
      OnCalendar=${schedule == "" ? "hourly" : schedule}
      Persistent=true
      Unit=dsrp-trainer.service

      [Install]
      WantedBy=timers.target

runcmd:
  - [ sh, -c, "curl -fsSL https://get.docker.com | sh" ]
  - [ usermod, -aG, docker, "${admin_user}" ]
  - [ systemctl, enable, --now, docker ]
  - [ systemctl, enable, dsrp-trainer.service ]
  - [ systemctl, start, dsrp-trainer.service ]
  # Enable the timer only when the user actually set a schedule. If empty we
  # leave the timer unit on disk but disabled, so it's easy to flip on later
  # with: sudo systemctl enable --now dsrp-trainer.timer
  - [ sh, -c, "[ -n '${schedule}' ] && systemctl enable --now dsrp-trainer.timer || echo '[cloud-init] trainer_schedule empty — timer left disabled'" ]
