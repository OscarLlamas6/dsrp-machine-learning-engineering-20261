version: '3'

# Taskfile para el módulo 4 — IaC con Terraform sobre Azure.
# Adaptado del Taskfile original del curso DSRP MLOps (rama 2025-4).
#
# Pre-requisitos:
#   - go-task    → brew install go-task
#   - terraform  → brew install terraform
#   - azure-cli  → brew install azure-cli   (luego: az login)

vars:
  # Backend remoto (state file en Azure Storage)
  BACKEND_RG_NAME:    "rg-terraform-state-dsrp-modulo4"
  BACKEND_LOCATION:   "East US"
  CONTAINER_NAME:     "tfstate"
  KEY_NAME:           "modulo4.terraform.tfstate"

  # Variables de la infraestructura del módulo
  TFVARS_FILE:        "dsrp-values.tfvars"

  # .env de la raíz del repo — destino para `task creds:export`
  REPO_ENV_FILE:      "../../.env"

tasks:

  default:
    desc: "Muestra las tareas disponibles"
    cmds:
      - task --list

  # ──────────────────────────────────────────────────────────────────────
  # BACKEND REMOTO — state file en Azure Storage
  # ──────────────────────────────────────────────────────────────────────

  backend:setup:
    desc: "Crea el storage account para el state remoto y genera backend.hcl"
    cmds:
      - |
        set -euo pipefail

        echo "🧹 Limpiando estado local de Terraform..."
        if [ -d ".terraform" ]; then
          rm -rf .terraform
          echo "   ✅ Carpeta .terraform eliminada"
        fi
        if [ -f ".terraform.lock.hcl" ]; then
          rm -f .terraform.lock.hcl
          echo "   ✅ Archivo .terraform.lock.hcl eliminado"
        fi
        echo ""

        echo "🚀 Creando backend remoto de Terraform en Azure..."
        RANDOM_SUFFIX=$(openssl rand -hex 4 | tr '[:upper:]' '[:lower:]')
        STORAGE_NAME="tfstatedsrp4${RANDOM_SUFFIX}"
        echo "📦 Storage Account: ${STORAGE_NAME}"
        echo ""

        # 0) Autenticación
        if ! az account show &> /dev/null; then
          echo "⚠️  No has iniciado sesión en Azure. Ejecutando az login..."
          az login
        fi
        echo "📋 Suscripción activa:"
        az account show --query '{Name:name, SubscriptionId:id, State:state}' -o tsv | awk '{print "   " $0}'
        echo ""

        # 1) Proveedor Microsoft.Storage
        echo "1️⃣  Verificando proveedor Microsoft.Storage..."
        STATE=$(az provider show --namespace Microsoft.Storage --query "registrationState" -o tsv)
        if [ "$STATE" != "Registered" ]; then
          az provider register --namespace Microsoft.Storage --wait
          echo "   ✅ Proveedor registrado"
        else
          echo "   ✅ Proveedor ya registrado"
        fi

        # 2) Resource group
        echo "2️⃣  Resource group para el state..."
        if az group show --name "{{.BACKEND_RG_NAME}}" &> /dev/null; then
          echo "   ✅ Ya existe: {{.BACKEND_RG_NAME}}"
        else
          az group create \
            --name "{{.BACKEND_RG_NAME}}" \
            --location "{{.BACKEND_LOCATION}}" \
            --output none
          echo "   ✅ Creado: {{.BACKEND_RG_NAME}}"
        fi

        # 3) Storage account
        echo "3️⃣  Storage account..."
        az storage account create \
          --resource-group "{{.BACKEND_RG_NAME}}" \
          --name "${STORAGE_NAME}" \
          --sku Standard_LRS \
          --encryption-services blob \
          --location "{{.BACKEND_LOCATION}}" \
          --allow-blob-public-access false \
          --min-tls-version TLS1_2 \
          --output none
        echo "   ✅ Creado: ${STORAGE_NAME}"
        sleep 5

        # 4) Versionado + soft-delete (protege el state)
        echo "4️⃣  Versionado y soft-delete..."
        az storage account blob-service-properties update \
          --account-name "${STORAGE_NAME}" \
          --resource-group "{{.BACKEND_RG_NAME}}" \
          --enable-versioning true \
          --enable-delete-retention true \
          --delete-retention-days 30 \
          --output none
        echo "   ✅ Versionado activado, retención 30 días"

        # 5) Container
        echo "5️⃣  Container {{.CONTAINER_NAME}}..."
        az storage container create \
          --name "{{.CONTAINER_NAME}}" \
          --account-name "${STORAGE_NAME}" \
          --auth-mode login \
          --output none || true
        echo "   ✅ Container listo"

        # 6) backend.hcl
        echo "6️⃣  Generando backend.hcl..."
        cat > backend.hcl <<EOF
        resource_group_name  = "{{.BACKEND_RG_NAME}}"
        storage_account_name = "${STORAGE_NAME}"
        container_name       = "{{.CONTAINER_NAME}}"
        key                  = "{{.KEY_NAME}}"
        EOF
        echo "   ✅ backend.hcl creado"
        echo ""

        echo "🎉 Backend remoto listo!"
        echo ""
        echo "💡 Siguiente paso:"
        echo "   task init"

  backend:destroy:
    desc: "Borra el resource group del state remoto (¡cuidado!)"
    prompt: "Esto destruye el storage account del state. ¿Continuar?"
    cmds:
      - az group delete --name "{{.BACKEND_RG_NAME}}" --yes --no-wait
      - rm -f backend.hcl
      - echo "🗑️  Resource group del state programado para borrado."

  # ──────────────────────────────────────────────────────────────────────
  # CICLO DE VIDA DE TERRAFORM
  # ──────────────────────────────────────────────────────────────────────

  init:
    desc: "terraform init con el backend remoto (backend.hcl)"
    preconditions:
      - sh: test -f backend.hcl
        msg: "Falta backend.hcl. Corre primero: task backend:setup"
    cmds:
      - terraform init -backend-config=backend.hcl -input=false

  fmt:
    desc: "Formatea los archivos .tf"
    cmds:
      - terraform fmt -recursive

  validate:
    desc: "Valida la sintaxis de los .tf"
    cmds:
      - terraform validate

  plan:
    desc: "terraform plan con dsrp-values.tfvars"
    preconditions:
      - sh: test -f {{.TFVARS_FILE}}
        msg: "Falta {{.TFVARS_FILE}}. Copia el .example: cp dsrp-values.tfvars.example {{.TFVARS_FILE}} y edítalo."
    cmds:
      - terraform plan -var-file={{.TFVARS_FILE}} -out=tfplan

  apply:
    desc: "Aplica el plan (si existe tfplan) o ejecuta terraform apply con tfvars"
    cmds:
      - |
        if [ -f tfplan ]; then
          terraform apply tfplan
          rm -f tfplan
        else
          terraform apply -var-file={{.TFVARS_FILE}} -auto-approve
        fi

  destroy:
    desc: "Destruye toda la infraestructura del módulo (VM, NSG, IP, etc.)"
    prompt: "Esto destruye la VM y todos los recursos. ¿Continuar?"
    cmds:
      - terraform destroy -var-file={{.TFVARS_FILE}} -auto-approve

  outputs:
    desc: "Muestra los outputs de Terraform"
    cmds:
      - terraform output

  deploy:
    desc: "One-shot: backend:setup → init → apply. Pensado para empezar desde cero."
    prompt: "Esto crea el backend remoto (si no existe), inicializa Terraform y aplica con auto-approve. ¿Continuar?"
    preconditions:
      - sh: test -f {{.TFVARS_FILE}}
        msg: "Falta {{.TFVARS_FILE}}. Copia el ejemplo: cp dsrp-values.tfvars.example {{.TFVARS_FILE}} y edítalo."
    cmds:
      - task: backend:setup
      - task: init
      - terraform apply -var-file={{.TFVARS_FILE}} -auto-approve
      - task: creds:export
      - echo ""
      - echo "✅ Infra arriba. SSH lista en 'task ssh'. Logs en 'task logs'."

  creds:export:
    desc: "Escribe la connection string del storage en ../../.env (para correr los notebooks localmente)"
    cmds:
      - |
        set -euo pipefail
        CS=$(terraform output -raw azure_storage_connection_string)
        SA=$(terraform output -raw storage_account_name)
        CT=$(terraform output -raw storage_container_name)
        ENV_FILE="{{.REPO_ENV_FILE}}"
        touch "$ENV_FILE"
        # Quita líneas previas con las mismas claves para que sea idempotente.
        tmp=$(mktemp)
        grep -vE '^(AZURE_STORAGE_CONNECTION_STRING|AZURE_STORAGE_CONTAINER|AZURE_STORAGE_ACCOUNT)=' "$ENV_FILE" > "$tmp" || true
        {
          cat "$tmp"
          echo "AZURE_STORAGE_ACCOUNT=$SA"
          echo "AZURE_STORAGE_CONTAINER=$CT"
          echo "AZURE_STORAGE_CONNECTION_STRING=\"$CS\""
        } > "$ENV_FILE"
        rm -f "$tmp"
        echo "🔐 .env actualizado:"
        echo "   AZURE_STORAGE_ACCOUNT=$SA"
        echo "   AZURE_STORAGE_CONTAINER=$CT"
        echo "   AZURE_STORAGE_CONNECTION_STRING=<oculta>"
        echo ""
        echo "💡 .env está en .gitignore — no se commitea."

  # ──────────────────────────────────────────────────────────────────────
  # OPERAR LA VM RECIÉN CREADA
  # ──────────────────────────────────────────────────────────────────────

  ssh:
    desc: "Hace SSH a la VM provisionada (NSG ya está restringido a tu IP/32)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        CIDR=$(terraform output -raw ssh_allowed_cidr_effective)
        KEY=$(ls ssh/*.pem | head -1)
        echo "🔑 IP destino : $IP"
        echo "🛡️  NSG abierto: $CIDR"
        echo ""
        echo "Comandos útiles dentro de la VM:"
        echo "  docker ps -a                                   # contenedores"
        echo "  docker images                                  # imágenes"
        echo "  docker logs dsrp-trainer                       # logs (si todavía no se borró)"
        echo "  docker run --rm -it --env-file /etc/dsrp/trainer.env --entrypoint bash <image>   # explorar interactivo"
        echo "  sudo journalctl -u dsrp-trainer.service -n 100 # log del oneshot"
        echo "  sudo cat /usr/local/bin/run-trainer.sh         # script que corre Docker"
        echo "  sudo cat /etc/dsrp/trainer.env                 # env vars (incl. conn string)"
        echo "  sudo systemctl list-timers dsrp-trainer.timer  # próximo disparo"
        echo ""
      - ssh -i "$(ls ssh/*.pem | head -1)" -o StrictHostKeyChecking=no azureuser@"$(terraform output -raw public_ip)"

  vm:check-skus:
    desc: "Lista SKUs de 2 vCPU disponibles para tu suscripción en la región de tfvars (úsalo ANTES de cambiar vm_size o location)"
    cmds:
      - |
        set -euo pipefail
        REGION=$(grep -E '^[[:space:]]*location' {{.TFVARS_FILE}} 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)"/\1/' || echo "centralus")
        SKU=$(grep -E '^[[:space:]]*vm_size' {{.TFVARS_FILE}} 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)"/\1/' || echo "Standard_D2as_v4")
        echo "📍 Región configurada en tfvars : $REGION"
        echo "🖥️  VM size configurado en tfvars: $SKU"
        echo ""
        echo "─── ¿Está disponible el SKU configurado? ───"
        STATUS=$(az vm list-skus --location "$REGION" --resource-type virtualMachines \
                   --query "[?name=='$SKU'] | length(@)" -o tsv)
        if [ "$STATUS" = "0" ]; then
          echo "❌ $SKU NO está ofrecido en $REGION para tu suscripción."
        else
          REASON=$(az vm list-skus --location "$REGION" --resource-type virtualMachines \
                     --query "[?name=='$SKU'].restrictions[].reasonCode | [0]" -o tsv)
          if [ -z "$REASON" ]; then
            echo "✅ $SKU está disponible en $REGION."
          else
            echo "🚫 $SKU está restringido en $REGION ($REASON)."
          fi
        fi
        echo ""
        echo "─── Alternativas (2 vCPU, 4-8 GiB, sin restricción, en familia con quota) en $REGION ───"
        az vm list-skus --location "$REGION" --resource-type virtualMachines -o json | \
          jq -r '
            [.[] |
              select(.resourceType=="virtualMachines") |
              select(any(.capabilities[]; .name=="vCPUs" and (.value|tonumber)==2)) |
              select(any(.capabilities[]; .name=="MemoryGB" and (.value|tonumber)>=4 and (.value|tonumber)<=8)) |
              select((.restrictions // []) | length == 0) |
              {name, mem: ([.capabilities[] | select(.name=="MemoryGB") | .value][0])}
            ] |
            sort_by(.name)[] | "  \(.name)  (2 vCPU / \(.mem) GiB)"
          '
        echo ""
        echo "─── Tu quota actual en $REGION (familias con limit>0) ───"
        az vm list-usage --location "$REGION" \
          --query "[?to_number(limit)>\`0\` && (contains(localName,'Family vCPU') || contains(localName,'Regional vCPU'))].{Family:localName, Used:currentValue, Limit:limit}" \
          -o table

  vm:nsg-refresh-ip:
    desc: "Re-aplica Terraform para actualizar el NSG con tu IP pública actual (usar si te cambia el IP)"
    cmds:
      - |
        if [ "$(terraform output -raw ssh_allowed_cidr_effective 2>/dev/null | grep -c '/32')" = "0" ]; then
          echo "⚠️  ssh_allowed_cidr no está en modo 'auto' (o fijo a /32). Edita tfvars si quieres auto-detect."
        fi
      - terraform apply -var-file={{.TFVARS_FILE}} -auto-approve -target=azurerm_network_security_group.nsg
      - terraform output -raw ssh_allowed_cidr_effective
      - echo ""

  vm:docker-ps:
    desc: "Lista contenedores Docker en la VM (running + parados)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" "docker ps -a"

  vm:docker-images:
    desc: "Lista imágenes Docker en la VM"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" "docker images"

  vm:docker-inspect:
    desc: "Inspecciona la imagen del trainer en la VM (labels, env, layers)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        IMG=$(terraform output -raw image_ref)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" \
          "docker image inspect $IMG --format '{{println \"=== ID ===\"}}{{.Id}}{{println}}{{println \"=== Created ===\"}}{{.Created}}{{println}}{{println \"=== Entrypoint ===\"}}{{json .Config.Entrypoint}}{{println}}{{println \"=== Env ===\"}}{{range .Config.Env}}{{println .}}{{end}}{{println \"=== Labels ===\"}}{{json .Config.Labels}}'"

  vm:docker-shell:
    desc: "Abre un shell DENTRO de la imagen del trainer en la VM (no toca el trainer corriendo)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        IMG=$(terraform output -raw image_ref)
        ssh -i "$KEY" -t -o StrictHostKeyChecking=no azureuser@"$IP" \
          "docker run --rm -it --env-file /etc/dsrp/trainer.env --entrypoint bash $IMG"

  logs:
    desc: "Sigue los logs del trainer en la VM"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" \
          "sudo journalctl -u dsrp-trainer.service -f"

  trainer:rerun:
    desc: "Vuelve a ejecutar el trainer en la VM (systemd oneshot)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" \
          "sudo systemctl start dsrp-trainer.service && sudo journalctl -u dsrp-trainer.service -n 50 --no-pager"

  trainer:status:
    desc: "Estado del service + timer del trainer en la VM"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" "\
          echo '── dsrp-trainer.service ──' && \
          sudo systemctl status dsrp-trainer.service --no-pager -l || true; \
          echo; echo '── dsrp-trainer.timer ──' && \
          sudo systemctl status dsrp-trainer.timer --no-pager -l || true; \
          echo; echo '── próximos disparos ──' && \
          sudo systemctl list-timers dsrp-trainer.timer --no-pager || true"

  trainer:schedule:on:
    desc: "Habilita la corrida programada en la VM (usa el OnCalendar del .timer)"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" \
          "sudo systemctl enable --now dsrp-trainer.timer && sudo systemctl list-timers dsrp-trainer.timer --no-pager"

  trainer:schedule:off:
    desc: "Apaga la corrida programada en la VM"
    cmds:
      - |
        IP=$(terraform output -raw public_ip)
        KEY=$(ls ssh/*.pem | head -1)
        ssh -i "$KEY" -o StrictHostKeyChecking=no azureuser@"$IP" \
          "sudo systemctl disable --now dsrp-trainer.timer && echo 'timer apagado'"

  # ──────────────────────────────────────────────────────────────────────
  # UTILS
  # ──────────────────────────────────────────────────────────────────────

  clean:
    desc: "Borra artefactos locales (.terraform, planes, llaves SSH)"
    prompt: "Borrar .terraform, tfplan, ssh/ y *.tfstate.backup local. ¿Continuar?"
    cmds:
      - rm -rf .terraform tfplan ssh/
      - rm -f .terraform.lock.hcl terraform.tfstate.backup
      - echo "🧹 Artefactos locales eliminados."
